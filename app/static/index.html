<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepBolt | Professional URL Keeper</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>

    <!-- Auth Overlay -->
    <div id="authOverlay" class="auth-overlay hidden">
        <div id="loginPanel" class="auth-panel">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-bolt"></i></div>
                <div class="brand-name">DeepBolt</div>
            </div>
            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2.5rem;">Sign in to manage your services</p>
            
            <div class="form-field">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="e.g. sujal369">
            </div>
            <div class="form-field">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn btn-solid" onclick="handleLogin()">Sign In</button>
            <p class="auth-toggle">New here? <span onclick="toggleAuth('signup')">Create Account</span></p>
        </div>

        <div id="signupPanel" class="auth-panel hidden">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-bolt"></i></div>
                <div class="brand-name">DeepBolt</div>
            </div>
            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Join Us</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2.5rem;">Start keeping your services awake today</p>
            
            <div class="form-field">
                <label>Username</label>
                <input type="text" id="signupUsername" placeholder="Choose a username">
            </div>
            <div class="form-field">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password">
            </div>
            <button class="btn btn-solid" onclick="handleSignup()">Get Started</button>
            <p class="auth-toggle">Already have an account? <span onclick="toggleAuth('login')">Sign In</span></p>
        </div>
    </div>

    <!-- App Shell -->
    <div id="appShell" class="app-shell hidden">
        <aside class="sidebar">
            <a href="#" class="brand">
                <div class="brand-icon"><i class="fas fa-bolt"></i></div>
                <div class="brand-name">DeepBolt</div>
            </a>
            
            <nav style="flex: 1; display: flex; flex-direction: column; gap: 0.5rem;">
                <!-- Nav items can be added here if needed -->
            </nav>

            <div class="user-info-sidebar" style="border-top: 1px solid var(--glass-border); padding-top: 2rem;">
                <p style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;">Active Account</p>
                <p id="displayUsername" style="font-weight: 800; font-size: 1.125rem; margin-bottom: 1.5rem;">...</p>
                <button class="btn btn-ghost" onclick="logout()" style="width: 100%; padding: 0.75rem;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="container">
                <header class="header-group">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem;">
                        <div class="brand-icon" style="width: 32px; height: 32px; font-size: 1rem; border-radius: 8px;"><i class="fas fa-bolt"></i></div>
                        <h1 style="margin-bottom: 0;">Active Services</h1>
                    </div>
                    <p>Track and manage your web services' availability in real-time.</p>
                </header>

                <section class="card">
                    <div style="display: flex; gap: 1rem;">
                        <input type="url" id="urlInput" placeholder="https://your-app.render.com" style="flex: 1;">
                        <button onclick="addUrl()" class="btn btn-solid" style="width: auto; padding: 0 2rem;">
                            Keep Awake
                        </button>
                    </div>
                </section>

                <div id="urlList" class="url-grid">
                    <!-- Skeletons / Loader -->
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Layer -->
    <div id="toastStack" class="toast-stack"></div>

    <script src="script.js" defer></script>
</body>
</html>
